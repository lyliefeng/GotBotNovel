name: Build GotBotNovel release artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  EMBEDDING_MODEL: 'sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2'

jobs:
  desktop:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-14
            electron_script: dist:mac
            binary_name: gotbotnovel-backend
            artifact_name: GotBotNovel-macos-arm64
            output_glob: |
              electron/dist/*.dmg
              electron/dist/*.zip
              electron/dist/latest-mac.yml
          - platform: windows-x64
            runner: windows-latest
            electron_script: dist:win
            binary_name: gotbotnovel-backend.exe
            artifact_name: GotBotNovel-windows-x64
            output_glob: |
              electron/dist/*.exe
              electron/dist/*.blockmap
              electron/dist/latest.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            electron/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install backend packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Replace PyTorch with CPU-only wheel on Windows
        if: runner.os == 'Windows'
        run: |
          python -m pip install --force-reinstall --no-deps torch==2.8.0+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Download offline embedding model
        run: |
          python backend/packaging/download_embedding_model.py --model "${{ env.EMBEDDING_MODEL }}" --output electron/resources/embedding_model

      - name: Build backend executable
        run: |
          python -m PyInstaller --noconfirm --clean backend/packaging/gotbotnovel-backend.spec
          python -c "from pathlib import Path; import shutil; src=Path('dist/gotbotnovel-backend'); dst=Path('electron/resources/backend_bin'); shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst)"

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci --ignore-scripts

      - name: Copy packaged static files
        shell: bash
        run: |
          rm -rf electron/resources/static
          cp -R backend/static electron/resources/static

      - name: Configure Gitee desktop update source
        shell: bash
        env:
          GITEE_OWNER: ${{ vars.GITEE_OWNER || 'lv-liefeng' }}
          GITEE_REPO: ${{ vars.GITEE_REPO || 'GotBotNovel' }}
        run: node electron/configure-update-source.js "$GITEE_OWNER" "$GITEE_REPO"

      - name: Require macOS signing credentials for tagged releases
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          MACOS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$MACOS_CSC_LINK"
          test -n "$MACOS_CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Build desktop installer
        working-directory: electron
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ ((runner.os == 'macOS' && secrets.MACOS_CSC_LINK != '') || (runner.os == 'Windows' && secrets.WINDOWS_CSC_LINK != '')) && 'true' || 'false' }}
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_LINK || secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_KEY_PASSWORD || secrets.WINDOWS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD
          fi
          npm run ${{ matrix.electron_script }}

      - name: Upload desktop installer
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_glob }}
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Verify Android SDK
        run: |
          test -n "$ANDROID_HOME"
          test -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"

      - name: Install Android build tools
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0" >/dev/null

      - name: Build web assets
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: |
          npm ci
          npm run sync

      - name: Build unsigned release APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v6
        with:
          name: GotBotNovel-android
          path: mobile/android/app/build/outputs/apk/release/*-unsigned.apk
          if-no-files-found: error

  linux-source:
    name: Linux source archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create source archive
        run: |
          mkdir -p release
          git archive --format=tar.gz --prefix=GotBotNovel/ "${GITHUB_SHA}" > release/GotBotNovel-linux-source.tar.gz

      - name: Upload Linux source archive
        uses: actions/upload-artifact@v6
        with:
          name: GotBotNovel-linux-source
          path: release/GotBotNovel-linux-source.tar.gz
          if-no-files-found: error

  release:
    name: Publish Gitee desktop updates
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publishing scripts
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download macOS desktop artifacts
        uses: actions/download-artifact@v6
        with:
          name: GotBotNovel-macos-arm64
          path: release-assets

      - name: Download Windows desktop artifacts
        uses: actions/download-artifact@v6
        with:
          name: GotBotNovel-windows-x64
          path: release-assets

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(python -c "import json; print(json.load(open('electron/package.json'))['version'])")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

      - name: Prepare Gitee update chunks
        run: |
          python backend/packaging/prepare_gitee_update.py \
            --input release-assets \
            --output gitee-update-assets \
            --version "${GITHUB_REF_NAME#v}"

      - name: Install Gitee publishing dependency
        run: python -m pip install 'httpx==0.28.1'

      - name: Publish Gitee Release attachments
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER || 'lv-liefeng' }}
          GITEE_REPO: ${{ vars.GITEE_REPO || 'GotBotNovel' }}
          GITEE_TARGET: ${{ vars.GITEE_TARGET || 'main' }}
          GITEE_MACOS_REPO: ${{ vars.GITEE_MACOS_REPO || 'GotBotNovel-Updates-macOS' }}
          GITEE_MACOS_TARGET: ${{ vars.GITEE_MACOS_TARGET || 'master' }}
        run: |
          python backend/packaging/publish_gitee_release.py \
            --assets gitee-update-assets \
            --owner "$GITEE_OWNER" \
            --repo "$GITEE_REPO" \
            --macos-repo "$GITEE_MACOS_REPO" \
            --tag "$GITHUB_REF_NAME" \
            --target "$GITEE_TARGET" \
            --macos-target "$GITEE_MACOS_TARGET" \
            --replace-existing
