name: Build GotBotNovel release artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  EMBEDDING_MODEL: 'sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2'

jobs:
  desktop:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-14
            electron_script: dist:mac
            binary_name: gotbotnovel-backend
            artifact_name: GotBotNovel-macos-arm64
            output_glob: electron/dist/*.dmg
          - platform: windows-x64
            runner: windows-latest
            electron_script: dist:win
            binary_name: gotbotnovel-backend.exe
            artifact_name: GotBotNovel-windows-x64
            output_glob: electron/dist/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            electron/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install backend packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Download offline embedding model
        env:
          SENTENCE_TRANSFORMERS_HOME: ${{ github.workspace }}/electron/resources/embedding_onnx
        run: |
          python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('${{ env.EMBEDDING_MODEL }}', cache_folder=r'${{ github.workspace }}/electron/resources/embedding_onnx', device='cpu')"

      - name: Build backend executable
        run: |
          python -m PyInstaller --noconfirm --clean backend/packaging/gotbotnovel-backend.spec
          python -c "from pathlib import Path; import shutil; src=Path('dist/gotbotnovel-backend'); dst=Path('electron/resources/backend_bin'); shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst)"

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci --ignore-scripts

      - name: Copy packaged static files
        shell: bash
        run: |
          rm -rf electron/resources/static
          cp -R backend/static electron/resources/static

      - name: Build desktop installer
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.electron_script }}

      - name: Upload desktop installer
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_glob }}
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build web assets
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: |
          npm ci
          npm run sync

      - name: Build unsigned release APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v6
        with:
          name: GotBotNovel-android
          path: mobile/android/app/build/outputs/apk/release/*-unsigned.apk
          if-no-files-found: error

  linux-source:
    name: Linux source archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create source archive
        run: |
          mkdir -p release
          git archive --format=tar.gz --prefix=GotBotNovel/ "${GITHUB_SHA}" > release/GotBotNovel-linux-source.tar.gz

      - name: Upload Linux source archive
        uses: actions/upload-artifact@v6
        with:
          name: GotBotNovel-linux-source
          path: release/GotBotNovel-linux-source.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [desktop, android, linux-source]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "GotBotNovel ${GITHUB_REF_NAME}" \
            --generate-notes
